version: "3.9"

services:

  pipeline:
    build: .
    container_name: airbnb_pipeline
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./db:/app/db
    environment:
      - PYTHONPATH=/app
    command: >
      sh -c "
        echo '=== Starting Airbnb Pipeline ===' &&
        python -m src.ingest &&
        python -m src.clean &&
        python -m src.enrich &&
        python -m src.model &&
        echo '=== Pipeline Complete ==='
      "

  jupyter:
    build: .
    container_name: airbnb_jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./db:/app/db
      - ./notebooks:/app/notebooks
    environment:
      - PYTHONPATH=/app
    command: >
      jupyter notebook
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --NotebookApp.token=''
      --NotebookApp.password=''

  tests:
    build: .
    container_name: airbnb_tests
    volumes:
      - ./data:/app/data
      - ./db:/app/db
    environment:
      - PYTHONPATH=/app
    command: pytest tests/ -v